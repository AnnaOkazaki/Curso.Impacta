<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
</head>
<body>
    
    <section>

        <h1>Tabela</h1>

        <table border="1">
            
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Endereço</th>
                    <th>Telefone</th>
                    <th>CPF</th>
                </tr>
            </thead>

            <tbody>
                 <tr>
                    <td>Paulo</td>
                    <td>Rua das Flores</td>
                    <td>9999999999</td>
                    <td>873282882</td>
                </tr>
            </tbody>

            <tfoot>
                <tr>

                    <td colspan="4">Dados cadastrais</td>

                </tr>
            </tfoot>

        </table>

    </section>
</body>
</html>
